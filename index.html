<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0f0f10]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appBg: '#0f0f10',
                        appCard: '#1a1a1d',
                        appAccent: '#7c5cff',
                        appText: '#f5f5f5',
                        appMuted: '#9ca3af'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- PWA Manifest Link -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">
</head>
<body class="h-full text-appText font-['Inter'] antialiased selection:bg-appAccent/30 overflow-hidden">

    <div id="app-router" class="w-full h-full relative">
        
        <div id="app-loader" class="absolute inset-0 bg-appBg flex flex-col justify-center items-center z-50 transition-opacity duration-300">
            <div class="w-12 h-12 border-4 border-appAccent border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-appMuted text-sm animate-pulse">Initializing Nexus...</p>
        </div>

        <main id="main-content" class="w-full h-full"></main>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js",
                "firebase/messaging": "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js"
            }
        }
    </script>

    <script type="module" src="js/app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
</body>
</html>
